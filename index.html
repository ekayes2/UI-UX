<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Options Prototype</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container py-5 prototype-shell">
      <div class="screen-selector btn-group p-1 rounded-pill mb-4" role="group" aria-label="Screen selector">
        <button class="btn selector-btn" type="button">Menu</button>
        <button class="btn selector-btn active" type="button">Product options</button>
        <button class="btn selector-btn" type="button">Add-ons</button>
      </div>

      <section class="d-flex flex-wrap justify-content-between gap-3 align-items-start mb-4">
        <div>
          <h1 class="h3 mb-2">Product options</h1>
          <p class="text-secondary mb-0">Create option groups and define product customizations available to customers.</p>
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-light rounded-pill px-4">Add option group</button>
          <button type="button" class="btn btn-primary rounded-pill px-4">Save changes</button>
        </div>
      </section>

      <section class="option-group card-group-outer" data-group>
        <header class="group-header d-flex flex-wrap align-items-center justify-content-between gap-3" data-toggle-group>
          <div class="d-flex align-items-center gap-3">
            <input class="form-check-input mt-0" type="checkbox" checked aria-label="Enable Keyring options" />
            <h2 class="h5 mb-0">Keyring options</h2>
            <span class="badge rounded-pill text-bg-secondary">4 items</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-link text-light p-0 collapse-btn" type="button" aria-expanded="true" aria-label="Collapse group">
              <span class="chevron">⌄</span>
            </button>
            <button class="btn btn-sm btn-outline-danger rounded-pill" type="button">Remove</button>
          </div>
        </header>

        <div class="group-content mt-3" data-group-content>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Caption name</label>
              <input type="text" class="form-control" value="Engraving options" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Short description</label>
              <input type="text" class="form-control" value="Pick your shape and finish" />
            </div>
          </div>

          <div class="d-flex flex-wrap gap-3 mb-4">
            <button type="button" class="toggle-pill is-active" data-ui-toggle>
              <span>Required</span><span class="toggle-state">Yes</span>
            </button>
            <button type="button" class="toggle-pill" data-ui-toggle>
              <span>Multi-select</span><span class="toggle-state">No</span>
            </button>
          </div>

          <div class="d-flex flex-column gap-3">
            <article class="item-row d-flex flex-wrap align-items-center justify-content-between gap-3">
              <div class="d-flex align-items-center gap-3">
                <div class="thumb-placeholder" aria-hidden="true"></div>
                <div>
                  <h3 class="h6 mb-1">Silver Ring</h3>
                  <p class="text-secondary small mb-0">Classic polished loop</p>
                </div>
              </div>
              <div class="d-flex flex-wrap align-items-center gap-2">
                <label class="small text-secondary mb-0">Price</label>
                <input type="number" class="form-control price-input" value="5" min="0" step="0.01" />
                <button type="button" class="btn btn-sm btn-outline-light">Edit</button>
                <button type="button" class="btn btn-sm btn-outline-danger">Delete</button>
              </div>
            </article>

            <article class="item-row d-flex flex-wrap align-items-center justify-content-between gap-3">
              <div class="d-flex align-items-center gap-3">
                <div class="thumb-placeholder" aria-hidden="true"></div>
                <div>
                  <h3 class="h6 mb-1">Matte Ring</h3>
                  <p class="text-secondary small mb-0">Soft brushed finish</p>
                </div>
              </div>
              <div class="d-flex flex-wrap align-items-center gap-2">
                <label class="small text-secondary mb-0">Price</label>
                <input type="number" class="form-control price-input" value="8" min="0" step="0.01" />
                <button type="button" class="btn btn-sm btn-outline-light">Edit</button>
                <button type="button" class="btn btn-sm btn-outline-danger">Delete</button>
              </div>
            </article>
          </div>

          <button type="button" class="btn btn-outline-light mt-4 rounded-pill px-4">+ Add item</button>
        </div>
      </section>

      <section class="option-group card-group-outer" data-group>
        <header class="group-header d-flex flex-wrap align-items-center justify-content-between gap-3" data-toggle-group>
          <div class="d-flex align-items-center gap-3">
            <input class="form-check-input mt-0" type="checkbox" checked aria-label="Enable Keyring shapes" />
            <h2 class="h5 mb-0">Keyring shapes</h2>
            <span class="badge rounded-pill text-bg-secondary">3 items</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-link text-light p-0 collapse-btn" type="button" aria-expanded="false" aria-label="Expand group">
              <span class="chevron">⌄</span>
            </button>
            <button class="btn btn-sm btn-outline-danger rounded-pill" type="button">Remove</button>
          </div>
        </header>

        <div class="group-content mt-3 d-none" data-group-content>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Caption name</label>
              <input type="text" class="form-control" value="Shape" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Short description</label>
              <input type="text" class="form-control" value="Pick one" />
            </div>
          </div>
          <button type="button" class="btn btn-outline-light rounded-pill px-4">+ Add item</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
